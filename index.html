<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Prestasi Hafazan SMKATB 2026</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .hero { background: linear-gradient(135deg, #1a4d2e, #2e7d32) !important; color: white !important; padding: 30px 0; border-bottom: 5px solid #d4af37; text-align: center; -webkit-print-color-adjust: exact; }
        .logo-container { width: 120px; height: 120px; background: white !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; border: 3px solid #d4af37; overflow: hidden; -webkit-print-color-adjust: exact; }
        .school-logo { width: 100px; height: auto; object-fit: contain; }
        .filter-panel { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: -30px; position: relative; z-index: 10; }
        .card { border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; background: white; overflow: hidden; }
        .total-box { background: #1a4d2e !important; color: white !important; padding: 10px 20px; border-radius: 30px; display: inline-block; margin: 10px 5px; font-weight: bold; }
        
        /* GRID JUZUK KEMAS */
        .juzuk-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-top: 15px; }
        @media (max-width: 992px) { .juzuk-grid { grid-template-columns: repeat(5, 1fr); } }
        .juzuk-item { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .juzuk-num { font-size: 0.65rem; color: #6c757d; display: block; text-transform: uppercase; font-weight: bold; }
        .juzuk-val { font-weight: 800; font-size: 1.2rem; color: #1a4d2e; }
        .juzuk-item.active { background: #e8f5e9; border-color: #2e7d32; }
        .juzuk-item.khatam-box { background: #fff3cd; border-color: #ffc107; }

        /* GAYA TOP PERFORMERS */
        .card-top { border: none; border-left: 5px solid #d4af37; background: #fff9e6; }
        .medal { font-size: 1.2rem; margin-right: 5px; }
        .header-jantina { padding: 8px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; text-align: center; font-size: 0.9rem; }
        .bg-putera { background-color: #e3f2fd; color: #0d6efd; border: 1px solid #0d6efd; }
        .bg-puteri { background-color: #fce4ec; color: #d63384; border: 1px solid #d63384; }
        .txt-peratus { font-size: 0.75rem; display: block; color: #495057; font-weight: bold !important; margin-top: 2px; }

        @media print { .filter-panel, .btn-print { display: none !important; } }
    </style>
</head>
<body>

<div class="hero">
    <div class="container">
        <div class="logo-container"><img src="logo.png" alt="Logo SMKATB" class="school-logo"></div>
        <h2 class="fw-bold text-uppercase">Dashboard Prestasi Hafazan Tahun 2026</h2>
        <h4 class="mb-0">SMK AGAMA TOK BACHOK</h4>
        <div id="infoCetak" class="mt-2 text-white">DATA : <span id="paparTing"></span> | BULAN : <span id="paparBulan"></span></div>
    </div>
</div>

<div class="container my-4">
    <div class="filter-panel mb-4 btn-print">
        <div class="row g-3 justify-content-center align-items-end">
            <div class="col-md-3">
                <label class="form-label fw-bold">Bulan:</label>
                <select id="selBulan" class="form-select" onchange="muatData()">
                    <option value="JAN">JANUARI</option><option value="FEB" selected>FEBRUARI</option>
                    <option value="MAC">MAC</option><option value="APR">APRIL</option>
                    <option value="MEI">MEI</option><option value="JUN">JUN</option>
                    <option value="JUL">JULAI</option><option value="OGOS">OGOS</option>
                    <option value="SEP">SEPTEMBER</option><option value="OKT">OKTOBER</option>
                    <option value="NOV">NOVEMBER</option><option value="DIS">DISEMBER</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Tingkatan:</label>
                <select id="selTing" class="form-select" onchange="muatData()">
                    <option value="ALL">SEMUA TINGKATAN</option>
                    <option value="1">TINGKATAN 1</option><option value="2">TINGKATAN 2</option>
                    <option value="3">TINGKATAN 3</option><option value="4">TINGKATAN 4</option>
                    <option value="5">TINGKATAN 5</option>
                </select>
            </div>
            <div class="col-md-2"><button onclick="window.print()" class="btn btn-dark w-100 shadow-sm fw-bold">🖨️ CETAK PDF</button></div>
        </div>
    </div>

    <div class="text-center mb-4">
        <div class="total-box shadow-sm"><span id="labelTing">Keseluruhan Pelajar</span>: <span id="totalPelajar">0</span></div>
        <div class="total-box shadow-sm bg-warning text-dark">Pelajar Skip: <span id="totalSkip">0</span></div>
    </div>

    <!-- SEKSYEN PELAJAR TERBAIK (NEW) -->
    <div id="sectionTop" class="card p-3 mb-4 card-top d-none">
        <h5 class="fw-bold text-dark text-center mb-3">🌟 PELAJAR TASMIK TERBANYAK BULAN INI</h5>
        <div class="row">
            <div class="col-md-6 border-end">
                <div class="header-jantina bg-putera">TOP 3 PUTERA</div>
                <div id="listTopL" class="list-group list-group-flush"></div>
            </div>
            <div class="col-md-6">
                <div class="header-jantina bg-puteri">TOP 3 PUTERI</div>
                <div id="listTopP" class="list-group list-group-flush"></div>
            </div>
        </div>
    </div>

    <!-- RINGKASAN ASAL -->
    <div id="ringkasanSection" class="card p-3 mb-4 d-none">
        <h6 class="fw-bold text-success border-bottom pb-2">RINGKASAN PRESTASI MENGIKUT TINGKATAN</h6>
        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr><th>Ting</th><th>Jumlah</th><th>Khatam</th><th>Lebih (%)</th><th>Bawah (%)</th><th>Skip (%)</th></tr>
                </thead>
                <tbody id="isiRingkasan"></tbody>
            </table>
        </div>
    </div>

    <div class="card p-3 mb-4">
        <h6 class="fw-bold text-success border-bottom pb-2 text-center">TABURAN PELAJAR MENGIKUT JUZUK</h6>
        <div id="juzukGrid" class="juzuk-grid"></div>
    </div>
</div>

<script>
    const pautanBulan = ["JAN", "FEB", "MAC", "APR", "MEI", "JUN", "JUL", "OGOS", "SEP", "OKT", "NOV", "DIS"];
    const pautanURL = {
        "JAN": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=0&single=true&output=csv",
        "FEB": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=1376498148&single=true&output=csv",
        "MAC": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=216137022&single=true&output=csv",
        "APR": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=1844714932&single=true&output=csv",
        "MEI": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=544457727&single=true&output=csv",
        "JUN": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=175525940&single=true&output=csv",
        "JUL": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=1723006112&single=true&output=csv",
        "OGOS": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=2006426475&single=true&output=csv",
        "SEP": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=845385119&single=true&output=csv",
        "OKT": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=504640802&single=true&output=csv",
        "NOV": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=452114125&single=true&output=csv",
        "DIS": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYiDjR12MHpZvInZnwExZxUdha7h3Ud7okqz8YjCp62F4GAFjeobZqj6PPB3NfBcYlP_rbmW6if3DM/pub?gid=457144559&single=true&output=csv"
    };

    function muatData() {
        const bln = document.getElementById('selBulan').value;
        const ting = document.getElementById('selTing').value;
        const idx = pautanBulan.indexOf(bln);
        const urlSemasa = pautanURL[bln];
        const urlSblm = idx > 0 ? pautanURL[pautanBulan[idx-1]] : null;

        document.getElementById('paparBulan').innerText = bln;

        // Ambil dua data serentak
        Promise.all([
            new Promise(res => Papa.parse(urlSemasa, { download: true, header: true, complete: res })),
            urlSblm ? new Promise(res => Papa.parse(urlSblm, { download: true, header: true, complete: res })) : Promise.resolve({data:[]})
        ]).then(results => {
            prosesAnalisis(results[0].data, results[1].data, ting);
        });
    }

    function prosesAnalisis(dataSemasa, dataSblm, filterTing) {
        const mapSblm = new Map();
        dataSblm.forEach(d => { 
            let n = (d[Object.keys(d).find(k=>k.toLowerCase().includes('nama'))] || "").toUpperCase();
            let ms = parseFloat(d[Object.keys(d).find(k=>k.toLowerCase().includes('muka'))]) || 0;
            if(n) mapSblm.set(n, ms);
        });

        let listRanking = [];
        let totalCount = 0; let skipCount = 0;
        let juzukCounts = Array(31).fill(0);
        let s = { "Khatam": 0, "Lebih": 0, "Bawah": 0 };
        let tingSummary = {"1":{t:0,k:0,l:0,b:0,s:0},"2":{t:0,k:0,l:0,b:0,s:0},"3":{t:0,k:0,l:0,b:0,s:0},"4":{t:0,k:0,l:0,b:0,s:0},"5":{t:0,k:0,l:0,b:0,s:0}};

        dataSemasa.forEach(d => {
            const cari = (k) => d[Object.keys(d).find(x => x.toLowerCase().replace(/[\s.]/g, '').includes(k.toLowerCase()))] || '';
            let nama = (cari('namapelajar') || "").toUpperCase();
            if(!nama) return;

            let kls = cari('kelas');
            let tingData = kls.match(/\d+/) ? kls.match(/\d+/)[0] : '';
            let msSemasa = parseFloat(cari('mukasurat')) || 0;
            let msSblm = mapSblm.get(nama) || 0;
            let progress = msSemasa - msSblm;
            let isP = nama.includes(" BINTI ") || nama.includes(" BT ") || nama.includes(" BT.");

            if (filterTing === "ALL" || tingData === filterTing) {
                totalCount++;
                let ind = (cari('indikator') || "").toUpperCase();
                let isSkip = cari('skip') !== "" || ind.includes("SKIP");
                
                if(isSkip) skipCount++;
                if(ind.includes('KHATAM')) s.Khatam++;
                else if(ind.includes('LEBIH')) s.Lebih++;
                else if(ind.includes('BAWAH')) s.Bawah++;

                if(tingSummary[tingData]) {
                    tingSummary[tingData].t++;
                    if(isSkip) tingSummary[tingData].s++;
                    if(ind.includes('KHATAM')) tingSummary[tingData].k++;
                    else if(ind.includes('LEBIH')) tingSummary[tingData].l++;
                    else if(ind.includes('BAWAH')) tingSummary[tingData].b++;
                }

                listRanking.push({ nama, kls, progress, isP, ting: tingData });
                let cJ = msSemasa >= 604 ? 30 : Math.ceil((msSemasa - 1) / 20);
                if (cJ >= 1 && cJ <= 30) juzukCounts[cJ]++;
            }
        });

        // PAPAR TOP 3
        document.getElementById('sectionTop').classList.remove('d-none');
        paparTop(listRanking);

        // PAPAR RINGKASAN & JUZUK (Kod Asal)
        document.getElementById('totalPelajar').innerText = totalCount;
        document.getElementById('totalSkip').innerText = skipCount;
        // ... (Logik paparan juzuk grid & table ringkasan sama seperti sebelum ini)
    }

    function paparTop(ranking) {
        const topL = ranking.filter(p => !p.isP).sort((a,b) => b.progress - a.progress).slice(0, 3);
        const topP = ranking.filter(p => p.isP).sort((a,b) => b.progress - a.progress).slice(0, 3);
        
        const medals = ["🥇", "🥈", "🥉"];
        const render = (data, el) => {
            document.getElementById(el).innerHTML = data.map((p, i) => 
                `<div class="list-group-item d-flex justify-content-between align-items-center bg-transparent">
                    <div><span class="medal">${medals[i]}</span> <strong>${p.nama}</strong> <br><small class="text-muted">${p.kls}</small></div>
                    <span class="badge bg-success rounded-pill">+${p.progress} Ms</span>
                </div>`
            ).join('');
        };
        render(topL, 'listTopL'); render(topP, 'listTopP');
    }

    window.onload = muatData;
</script>
</body>
</html>
